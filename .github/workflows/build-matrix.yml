name: "Build Matrix"

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ labeled, opened, synchronize , reopened ]

jobs:
  build-matrix:
    if: contains(github.event.pull_request.labels.*.name, 'dependabot')
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    name: Make sure it builds.
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - name: Cache dependencies
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-
      - name: Install dependencies
        shell: bash
        timeout-minutes: 20
        run: |
          for attempt in 1 2 3; do
            npm ci && break
            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after ${attempt} attempts."
              exit 1
            fi
            echo "npm ci failed on attempt ${attempt}. Retrying in 15 seconds..."
            sleep 15
          done
      - name: Run build
        run: npm run build
        env:
          GATSBY_API_KEY: ${{ secrets.GATSBY_API_KEY }}
          GATSBY_G_MAPS: ${{ secrets.GATSBY_G_MAPS }}
